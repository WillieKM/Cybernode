<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Node // CMS Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
  <style>
    body {
      background: #0e1f38;
      color: #e8f4ff;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .loading {
      text-align: center;
      color: #00d4ff;
      letter-spacing: 3px;
      font-size: 13px;
    }
    .loading::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="loading">// INITIALIZING CMS</div>
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js" integrity="sha384-K+E/B3QG3FJrtRXoyUjME4ilx71pYGyrvAVxYvd/p0zCPuXsc3eoEuSzUW3Ke63V" crossorigin="anonymous"></script>
</body>
</html>
